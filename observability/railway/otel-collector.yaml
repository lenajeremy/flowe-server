# Railway variant: peers resolve via <service>.railway.internal, and every
# listener binds [::] — Railway private networking is IPv6(-first), and a
# 0.0.0.0 bind is unreachable from other services on legacy environments.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "[::]:4317"
      http:
        endpoint: "[::]:4318"

processors:
  batch:

exporters:
  otlp/tempo:
    endpoint: tempo.railway.internal:4317
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://loki.railway.internal:3100/otlp

  prometheus:
    endpoint: "[::]:8889"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
