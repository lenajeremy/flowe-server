global:
  scrape_interval: 5s

scrape_configs:
  # honor_labels keeps job="flowe-server" (set by the collector from
  # service.name) instead of overwriting it with this scrape job's name.
  - job_name: otel-collector
    honor_labels: true
    static_configs:
      - targets: ["otel-collector.railway.internal:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
